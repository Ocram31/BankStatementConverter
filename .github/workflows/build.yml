name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: BankStatementConverter-Windows
          - os: macos-13          # Intel x86_64 — runs on Intel + Apple Silicon via Rosetta
            artifact: BankStatementConverter-Mac
          - os: ubuntu-latest
            artifact: BankStatementConverter-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller converter.spec --noconfirm

      # ── macOS: fix permissions, zip with symlinks, create DMG ──────────────
      - name: Package macOS .app
        if: runner.os == 'macOS'
        run: |
          chmod +x dist/BankStatementConverter.app/Contents/MacOS/BankStatementConverter
          cd dist
          zip -r --symlinks ../BankStatementConverter-Mac.zip BankStatementConverter.app
          cd ..
          hdiutil create -volname "BankStatementConverter" \
            -srcfolder dist/BankStatementConverter.app \
            -ov -format UDZO \
            BankStatementConverter-Mac.dmg

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            BankStatementConverter-Mac.zip
            BankStatementConverter-Mac.dmg

      # ── Windows / Linux: standard single-folder artifact ───────────────────
      - name: Upload artifact (Windows / Linux)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/BankStatementConverter/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip Windows and Linux artifacts
        run: |
          cd artifacts
          for dir in BankStatementConverter-Windows BankStatementConverter-Linux; do
            if [ -d "$dir" ]; then
              (cd "$dir" && zip -r "../${dir}.zip" .)
            fi
          done

      - name: Collect release files
        run: |
          mkdir -p release_files
          # macOS artifacts are already pre-zipped with correct permissions
          cp artifacts/BankStatementConverter-Mac/BankStatementConverter-Mac.zip release_files/ 2>/dev/null || true
          cp artifacts/BankStatementConverter-Mac/BankStatementConverter-Mac.dmg release_files/ 2>/dev/null || true
          # Windows & Linux zips created above
          cp artifacts/BankStatementConverter-Windows.zip release_files/ 2>/dev/null || true
          cp artifacts/BankStatementConverter-Linux.zip   release_files/ 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          generate_release_notes: true
